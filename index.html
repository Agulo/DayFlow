<!DOCTYPE html>
<html>
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <title>Life Schedule</title>
    <link rel="stylesheet" href="look.css">
</head>
<body>
    <audio id="alarmSound" src="alarm.mp3"></audio>
    <div class="splash-screen" id="splashScreen">
        <img src="icon.png" alt="Life Schedule" class="splash-icon">
    </div>
    <div class="container">
        <header>
            <h1>📅 My Life Schedule</h1>
            <p class="subtitle">Get Life In Order</p>
        </header>

        <div class="input-section">
            <input type="time" id="time" class="time-input">
            <input type="text" id="task" placeholder="What's next?" class="task-input">
            <button onclick="addTask()" class="add-btn">Add Task</button>
        </div>

        <ul id="list" class="task-list"></ul>
    </div>
    <script src="app.js"></script>
</body>
</html>
